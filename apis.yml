name: Mandatory Reserves Requirement
description: A central bank regulation requiring commercial banks to hold a minimum
  percentage of customer deposits as reserves, either as cash in their vaults or as
  deposits with the central bank, to ensure liquidity and stability in the banking
  system. It is used across a range of industries and technical contexts to improve
  efficiency and outcomes.
